name: Build python application using goithub actions
on:
    push:
        branches:
            - master
    workflow_dispatch:
jobs:
    buildpythoncode:
        runs-on: ubuntu-latest
        steps:
            - name: Chekout code
              uses: actions/checkout@v7
            - name: Install python of version 3.11
              uses: actions/setup-python@v4
              with:
                 python-version: 3.11
            - name: Install dependencies using pip
              run: |
                python -m pip install --upgrade pip  
                pip install -r requirements.txt
            - name: run flake8 for code quality and static analysis
              run: flake8 .
              continue-on-error: true
            - name: run tests
              run: pytest tests --cov=app --cov-report=xml
